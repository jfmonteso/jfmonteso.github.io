<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Juego de los Chinos</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #F5F0E8 0%, #EDE0CC 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 36px 28px;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    }
    .app-icon {
      width: 96px; height: 96px;
      border-radius: 22px;
      margin: 0 auto 12px;
      display: block;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }
    h1 {
      font-size: 20px; font-weight: 800;
      color: #1a1a1a; margin-bottom: 4px;
    }
    .tagline { font-size: 13px; color: #888; margin-bottom: 20px; }
    .divider { height: 1px; background: #f0f0f0; margin: 0 0 20px; }
    .invite-label {
      font-size: 11px; color: #aaa;
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px;
    }
    .room-name {
      font-size: 17px; font-weight: 700;
      color: #1a1a1a; margin-bottom: 16px;
    }
    .code-label {
      font-size: 11px; color: #aaa;
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
    }
    .code {
      font-size: 38px; font-weight: 900; letter-spacing: 10px;
      color: #1a1a1a; background: #F5F0E8;
      border-radius: 14px; padding: 16px 8px;
      margin-bottom: 24px;
    }
    .btn-play {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: #01875F; color: white;
      border-radius: 12px; padding: 16px 20px;
      text-decoration: none; font-size: 15px; font-weight: 700;
      margin-bottom: 14px;
      transition: background .15s;
    }
    .btn-play:hover { background: #016D4C; }
    .gplay-icon {
      width: 22px; height: 22px; flex-shrink: 0;
    }
    .hint {
      font-size: 12px; color: #bbb; line-height: 1.6;
    }
  </style>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code') || '——';
      const room = params.get('room')
        ? decodeURIComponent(params.get('room')) : '';
      document.getElementById('code').textContent = code;
      if (room) {
        document.getElementById('room-name').textContent = room;
        document.getElementById('room-section').style.display = 'block';
      }
    });
  </script>
</head>
<body>
  <div class="card">
    <img class="app-icon"
         src="https://play-lh.googleusercontent.com/zKTMP_CdJT10gvn4A5NxUVkKCORie1yN7VOEFrRNimvZPz4uc9ulp1V_6xJ7HYxKntiv43z5-85IyQZvjbUZww=w240-h480-rw"
         alt="Juego de los Chinos">
    <h1>Juego de los Chinos</h1>
    <p class="tagline">Te han invitado a una partida</p>
    <div class="divider"></div>
    <div id="room-section" style="display:none">
      <p class="invite-label">Sala</p>
      <p class="room-name" id="room-name"></p>
    </div>
    <p class="code-label">Código de sala</p>
    <div class="code" id="code">——</div>
    <a class="btn-play"
       href="https://play.google.com/store/apps/details?id=com.titogamingcompany.juego_chinos&hl=es_419">
      <svg class="gplay-icon" viewBox="0 0 24 24" fill="white">
        <path d="M3.18 23.76c.3.17.64.24.99.2l12.6-11.6L13.1 8.7 3.18 23.76z"/>
        <path d="M20.96 10.1l-2.94-1.7-3.77 3.47 3.77 3.47 2.97-1.72a1.64 1.64 0 0 0 0-2.84l-.03-.48z" fill="white"/>
        <path d="M3.18.24A1.64 1.64 0 0 0 2.5 1.6v20.8c0 .56.28 1.05.68 1.36L13.1 13.3 3.18.24z" fill="white" opacity=".8"/>
        <path d="M4.17.04 13.1 8.7l3.67-3.37L4.17.04z" fill="white" opacity=".6"/>
      </svg>
      Descargar en Google Play
    </a>
    <p class="hint">
      ¿Ya tienes la app instalada?<br>
      ábrelo y usa el código de arriba para unirte o actualiza la aplicación.
    </p>
  </div>
</body>
</html>
