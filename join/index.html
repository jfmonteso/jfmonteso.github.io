<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>El juego de los Chinos</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #f1f3f4;
      font-family: 'Roboto', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      width: 100%;
      max-width: 400px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
    }
    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 20px 20px 16px;
      border-bottom: 1px solid #f0f0f0;
    }
    .app-icon {
      width: 72px; height: 72px;
      border-radius: 16px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .app-title { font-size: 17px; font-weight: 700; color: #202124; line-height: 1.2; }
    .app-dev { font-size: 13px; color: #01875F; font-weight: 500; margin-top: 3px; }
    .app-meta { font-size: 12px; color: #70757a; margin-top: 2px; }
    .body { padding: 20px; }
    .label {
      font-size: 11px; font-weight: 500;
      color: #70757a; text-transform: uppercase;
      letter-spacing: 0.8px; margin-bottom: 4px;
    }
    .room-name {
      font-size: 16px; font-weight: 600;
      color: #202124; margin-bottom: 18px;
    }
    .code-box {
      background: #f8f9fa;
      border: 1.5px solid #e0e0e0;
      border-radius: 12px;
      padding: 14px 8px;
      text-align: center;
      font-size: 38px;
      font-weight: 900;
      letter-spacing: 12px;
      color: #202124;
      margin-bottom: 20px;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      background: #01875F;
      color: #fff;
      border-radius: 24px;
      padding: 14px 20px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      letter-spacing: 0.2px;
    }
    .btn:hover { background: #016D4C; }
    .btn svg { flex-shrink: 0; }
    .hint {
      font-size: 12px;
      color: #9aa0a6;
      text-align: center;
      margin-top: 14px;
      line-height: 1.6;
    }
  </style>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const p = new URLSearchParams(window.location.search);
      const code = p.get('code') || '——';
      const room = p.get('room') ? decodeURIComponent(p.get('room')) : '';
      document.getElementById('code').textContent = code;
      if (room) {
        document.getElementById('room-name').textContent = room;
        document.getElementById('room-section').style.display = 'block';
      }
    });
  </script>
</head>
<body>
  <div class="card">
    <div class="header">
      <img class="app-icon" src="/icon.png" alt="El juego de los Chinos">
      <div>
        <div class="app-title">El juego de los Chinos</div>
        <div class="app-dev">TiTo Gaming Company</div>
        <div class="app-meta">PEGI 3 · Juegos de mesa</div>
      </div>
    </div>
    <div class="body">
      <div id="room-section" style="display:none">
        <div class="label">Sala</div>
        <div class="room-name" id="room-name"></div>
      </div>
      <div class="label">Código de sala</div>
      <div class="code-box" id="code">——</div>
      <a class="btn"
         href="https://play.google.com/store/apps/details?id=com.titogamingcompany.juego_chinos&hl=es_419">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M4.08 23.74a1.5 1.5 0 0 0 1.7-.18l13.1-12.06L14.6 7.2 4.08 23.74z" fill="white"/>
          <path d="M21.5 10.56l-3.06-1.77-3.93 3.62 3.93 3.61 3.1-1.8a1.7 1.7 0 0 0 0-2.96l-.04.3z" fill="white"/>
          <path d="M4.08.26A1.7 1.7 0 0 0 3.35 1.7v20.6c0 .58.3 1.1.73 1.44L14.6 12 4.08.26z" fill="white" opacity=".85"/>
          <path d="M5.1.04 14.6 7.2l3.84-3.54L5.1.04z" fill="white" opacity=".65"/>
        </svg>
        Instalar en Google Play
      </a>
      <p class="hint">
        ¿Ya tienes el juego instalado?<br>
        Ábrelo y usa el código de arriba para unirte o actualiza la aplicación.
      </p>
    </div>
  </div>
</body>
</html>
